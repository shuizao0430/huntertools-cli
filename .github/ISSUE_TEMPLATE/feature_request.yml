name: "Feature Request"
description: Suggest a recruiting workflow feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make HunterToolsCLI better for sourcing, outreach, inbox follow-up, or recruiting operations? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature or improvement you want.
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Recruiting Workflow
      description: Which recruiting workflow does this improve?
      placeholder: "candidate search, inbox follow-up, project save, export, release flow..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? Who benefits from it?
      placeholder: "As a recruiter, I want to ... so that ..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you already have an implementation idea, describe it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workaround or alternative you considered?
    validations:
      required: false
